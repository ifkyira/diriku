<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IFKYY • Music</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#050505;
color:white;
overflow-x:hidden;
}

/* ================= NAV ================= */
nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 8%;
background:rgba(10,10,10,0.85);
backdrop-filter:blur(15px);
z-index:999;
border-bottom:1px solid rgba(255,215,0,0.15);
}

.logo{
font-size:24px;
font-weight:800;
background:linear-gradient(to right,#fff,#ffd700);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.back{
color:#ffd700;
text-decoration:none;
font-weight:600;
padding:8px 14px;
border:1px solid rgba(255,215,0,0.4);
border-radius:10px;
transition:0.3s;
}

.back:hover{
background:#ffd700;
color:#000;
}

/* ================= HEADER ================= */
.header{
text-align:center;
margin-top:120px;
padding:20px;
}

.header h1{
font-size:50px;
}

.header span{
color:#ffd700;
}

/* ================= MUSIC GRID ================= */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
padding:50px 8%;
}

.card{
background:rgba(255,255,255,0.03);
border:1px solid rgba(255,215,0,0.1);
border-radius:20px;
padding:20px;
text-align:center;
transition:0.3s;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 10px 30px rgba(255,215,0,0.15);
}

.card i{
font-size:40px;
color:#ffd700;
margin-bottom:15px;
}

.card h3{
margin-bottom:10px;
}

.card p{
color:#ccc;
}

/* ================= SPOTIFY BOX ================= */
.spotify{
padding:40px 8%;
text-align:center;
}

iframe{
width:100%;
max-width:500px;
height:380px;
border-radius:15px;
border:none;
}

/* ================= FOOTER ================= */
footer{
text-align:center;
padding:30px;
color:#888;
border-top:1px solid rgba(255,215,0,0.1);
margin-top:50px;
}

</style>
</head>

<body>

<!-- NAV -->
<nav>
<div class="logo">IFKYY MUSIC</div>
<a href="index.html" class="back">⬅ Kembali</a>
</nav>

<!-- HEADER -->
<div class="header">
<h1>🎧 My <span>Music</span></h1>
<p>Musik favorit yang menemani aktivitas gaming & desain</p>
</div>

<!-- MUSIC CARDS -->
<div class="grid">

<div class="card">
<i class="fa-brands fa-spotify"></i>
<h3>Spotify Playlist</h3>
<p>Playlist utama untuk gaming & chill</p>
</div>

<div class="card">
<i class="fa-solid fa-gamepad"></i>
<h3>Gaming Music</h3>
<p>Musik cepat untuk fokus bermain game</p>
</div>

<div class="card">
<i class="fa-solid fa-headphones"></i>
<h3>Lo-fi / Chill</h3>
<p>Musik santai untuk belajar & desain</p>
</div>

</div>

<!-- SPOTIFY EMBED -->
<div class="spotify">

<h2 style="margin-bottom:20px;color:#ffd700;">🎵 Playlist Favorit</h2>

<iframe 
src="https://open.spotify.com/embed/playlist/5zzhouagkVVJG8Yj8oWCZS"
allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
</iframe>

</div>

<!-- FOOTER -->
<footer>
© 2026 IFKYY Music Page
</footer>

</body>
</html>
